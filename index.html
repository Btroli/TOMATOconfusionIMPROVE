<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>批量小番茄混淆</title>
	<style>
		* {
		    box-sizing: border-box;
		    margin: 0;
		    padding: 0;
		    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
		}
		
		body {
		    background: #121212;
		    color: #eee;
		    line-height: 1.6;
		    min-height: 100vh;
		    padding: 20px;
		}
		
		.container {
		    max-width: 1200px;
		    margin: 0 auto;
		    background: rgba(30, 30, 40, 0.95);
		    border-radius: 15px;
		    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
		    overflow: hidden;
		}
		
		header {
		    background: linear-gradient(90deg, #180161, #4f1787, #eb3678);
		    color: white;
		    padding: 30px;
		    text-align: center;
		}
		
		h1 {
		    font-size: 2.5rem;
		    margin-bottom: 15px;
		}
		
		.description {
		    font-size: 1.1rem;
		    margin-bottom: 20px;
		    color: rgba(255, 255, 255, 0.95);
		    max-width: 800px;
		    margin-left: auto;
		    margin-right: auto;
		}
		
		.main-content {
		    padding: 30px;
		    padding-block-end: 0px;
		}
		
		.upload-section {
		    background: #2a2a3a;
		    padding: 55px;
		    border-radius: 20px;
		    border: 2px dashed #8a6de9;
		    text-align: center;
		    margin-bottom: 25px;
		    transition: all 0.3s ease;
		}
		
		.upload-section.dragover {
		    background: #3a3a5a;
		    border-color: #8a6de9;
		    transform: scale(1.02);
		}
		
		.file-input {
		    display: none;
		}
		
		.normal_button {
		    min-width: 4rem;
		    line-height: 2rem;
		    font-size: 1rem;
		    padding: 0 0.5rem;
		    margin: 0 0.5rem;
		    border: 0;
		    border-radius: 6px;
		    display: inline-block;
		    position: relative;
		    vertical-align: middle;
		    cursor: pointer;
		    transition: all 0.3s ease;
		}
		
		.normal_button:hover {
		    transform: translateY(-2px);
		    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
		}
		
		.normal_button:active {
		    transform: translateY(0);
		}
		
		.saveas-btn {
		    background: #3c8bfb;
		    color: #fff;
		}
		
		.upload-btn {
		    background: #180161;
		    color: #fff;
		    padding: 12px 25px;
		}
		
		.encrypt-btn {
		    background: #4f1787;
		    color: #fff;
		}
		
		.decrypt-btn {
		    background: #eb3678;
		    color: #fff;
		}
		
		.download-btn {
		    background: #fb773c;
		    color: #fff;
		}
		
		.process-buttons {
		    text-align: center;
		    margin: 25px 0;
		}
		
		.progress-container {
		    background: #2a2a3a;
		    padding: 20px;
		    border-radius: 10px;
		    margin: 20px 0;
		}
		
		.progress-title {
		    font-weight: bold;
		    margin-bottom: 15px;
		    color: #eee;
		    text-align: center;
		}
		
		.progress-bar {
		    height: 25px;
		    background: #444;
		    border-radius: 12px;
		    overflow: hidden;
		    margin: 15px 0;
		}
		
		.progress-fill {
		    height: 100%;
		    background: linear-gradient(90deg, #4f1787, #eb3678);
		    border-radius: 12px;
		    width: 0%;
		    transition: width 0.3s ease;
		}
		
		.progress-text {
		    text-align: center;
		    font-weight: bold;
		    color: #eee;
		}
		
		.image-grid {
		    display: grid;
		    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
		    gap: 15px;
		    margin: 25px 0;
		}
		
		.image-item {
		    background: #2a2a3a;
		    padding: 15px;
		    border-radius: 8px;
		    text-align: center;
		    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
		    transition: transform 0.3s ease;
		}
		
		.image-item:hover {
		    transform: translateY(-5px);
		}
		
		.image-preview {
		    width: 100%;
		    height: 120px;
		    object-fit: contain;
		    border-radius: 6px;
		    margin-bottom: 10px;
		    background: #333;
		}
		
		.image-name {
		    font-weight: bold;
		    color: #ddd;
		    white-space: nowrap;
		    overflow: hidden;
		    text-overflow: ellipsis;
		    margin-bottom: 5px;
		    font-size: 0.9rem;
		}
		
		.image-status {
		    font-size: 0.8rem;
		    color: #aaa;
		}
		
		.info-box {
		    background: #1e1e2e;
		    padding-top: 15px;
		    padding-left: 10px;
		    border-radius: 10px;
		    border-left: 4px solid #8a6de9;
		    margin-top: 25px;
		}
		
		.info-title {
		    font-weight: bold;
		    margin-bottom: 15px;
		    color: #eee;
		    text-align: center;
		    cursor: pointer;
		    user-select: none;
		}
		
		.info-title::before {
		    content: "▼ ";
		    display: inline-block;
		    transition: transform 0.3s ease;
		}
		
		.info-title.collapsed::before {
		    transform: rotate(-90deg);
		}
		
		.info-content {
		    overflow: hidden;
		    transition: max-height 0.3s ease;
		    max-height: 1000px;
		}
		
		.info-content.collapsed {
		    max-height: 0;
		}
		
		.info-list {
		    list-style-type: none;
		    padding: 10px 0;
		}
		
		.info-list li {
		    padding: 8px 0;
		    border-bottom: 1px dashed #555;
		    display: flex;
		    align-items: center;
		}
		
		.info-list li:last-child {
		    border-bottom: none;
		}
		
		.info-list li::before {
		    content: "✓";
		    color: #8a6de9;
		    font-weight: bold;
		    margin-right: 10px;
		}
		
		footer {
		    text-align: center;
		    padding: 20px;
		    background: #2a3a3a;
		    color: white;
		    margin-top: 25px;
		}
		
		.loading-spinner {
		    display: inline-block;
		    width: 20px;
		    height: 20px;
		    border: 3px solid rgba(255, 255, 255, 0.3);
		    border-radius: 50%;
		    border-top-color: #fff;
		    animation: spin 1s ease-in-out infinite;
		    margin-right: 10px;
		}
		
		@keyframes spin {
		    to {
		        transform: rotate(360deg);
		    }
		}
		
		@media (max-width: 768px) {
		    .upload-section .upload-btn {
		        display: block;
		        width: fit-content;
		        margin-left: auto;
		        margin-right: auto;
		    }
		}
		
		/* 预览模态框 */
		#previewModal {
		    display: none;
		    position: fixed;
		    top: 0;
		    left: 0;
		    width: 100%;
		    height: 100%;
		    background: rgba(0, 0, 0, 0.9);
		    z-index: 1000;
		    text-align: center;
		}
		
		#previewModal img {
		    max-width: 90%;
		    max-height: 90%;
		    margin-top: 5%;
		    border-radius: 8px;
		    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
		}
		
		#prevImage,
		#nextImage {
		    opacity: 0.1;
		    /* 其他基础样式 */
		}
		#prevImage:hover,
		#nextImage:hover {
		    opacity: 1;
		    background: rgba(0, 0, 0, 0.8);
		}
		
		@media (prefers-color-scheme: light) {
		    body {
		        background: #fff;
		        color: #333;
		    }
		
		    .container {
		        background: rgba(255, 255, 255, 0.95);
		    }
		
		    .upload-section {
		        background: #f8f9fa;
		        border-color: #4f1787;
		    }
		
		    .upload-section.dragover {
		        background: #e3f2fd;
		        border-color: #180161;
		    }
		
		    .progress-container {
		        background: #f8f9fa;
		    }
		
		    .progress-title,
		    .progress-text {
		        color: #180161;
		    }
		
		    .progress-bar {
		        background: #e0e0e0;
		    }
		
		    .image-item {
		        background: #f8f9fa;
		        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
		    }
		
		    .image-preview {
		        background: #ddd;
		    }
		
		    .image-name {
		        color: #180161;
		    }
		
		    .image-status {
		        color: #666;
		    }
		
		    .info-box {
		        background: #e3f2fd;
		        border-left-color: #4f1787;
		    }
		
		    .info-title {
		        color: #180161;
		    }
		
		    .info-list li {
		        border-bottom-color: #ccc;
		    }
		
		    .info-list li::before {
		        color: #4f1787;
		    }
		
		    footer {
		        background: #180161;
		    }
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="main-content">
			<div class="upload-section" id="uploadSection">
				<h2>上传多张图片进行批量处理</h2>
				<p>支持点击选择或拖拽图片到此处上传</p>
				<label class="normal_button upload-btn"> 选择图片 <input type="file" id="fileInput" class="file-input" accept="image/*" multiple />
				</label>
				<p id="selectedFiles">未选择文件</p>
			</div>
			<div class="process-buttons">
				<button id="encryptBtn" class="normal_button encrypt-btn" disabled> 批量混淆 </button>
				<button id="decryptBtn" class="normal_button decrypt-btn" disabled> 批量解混淆 </button>
				<button id="saveAsBtn" class="normal_button download-btn" disabled> 所有另存为 </button>
				<button id="downloadBtn" class="normal_button download-btn" disabled> 下载所有 </button>
			</div>
			<div class="progress-container">
				<div class="progress-title">处理进度</div>
				<div class="progress-bar">
					<div class="progress-fill" id="progressFill"></div>
				</div>
				<div class="progress-text" id="progressText"> 0 / 0 已完成 </div>
			</div>
			<div class="image-grid" id="imageGrid">
				<!-- 图片预览将在这里动态生成 -->
			</div>
			<div class="info-box">
				<div class="info-title collapsed" id="infoTitle"> 工具功能说明 </div>
				<div class="info-content collapsed" id="infoContent">
					<ul class="info-list">
						<li> 使用完全相同的希尔伯特曲线算法，确保结果与原版一致 </li>
						<li>保持像素的空间相关性，压缩后仍能保持色彩</li>
						<li>批量处理多张图片，支持同时混淆或解混淆</li>
						<li>处理后的图片格式为JPEG，质量1</li>
						<li>可视化处理进度和实时预览</li>
						<li>一键下载所有处理后的图片</li>
					</ul>
					<p style="text-align: center; margin-top: 15px"> 使用说明：上传图片后选择"批量混淆图片"或"批量解混淆图片"，处理完成后可以查看每张图片的效果，最后点击"下载所有图片"保存结果。 </p>
				</div>
			</div>
		</div>
		<footer>
			<p>© 2026 批量小番茄混淆 | 基于希尔伯特曲线算法</p>
		</footer>
	</div>
	<!-- 图片预览模态框 -->
	<div id="previewModal" style="
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                z-index: 1000;
                text-align: center;
            ">
		<span id="closeModal" style="
                    position: absolute;
                    top: 20px;
                    right: 30px;
                    color: white;
                    font-size: 30px;
                    cursor: pointer;
                ">&times;</span>
		<img id="modalImage" style="max-width: 90%; max-height: 90%; margin-top: 5%" />
		<!-- 左箭头 -->
		<button id="prevImage" style="
                    position: absolute;
                    left: 20px;
                    top: 50%;
                    transform: translateY(-50%);
                    background: rgba(0, 0, 0, 0.5);
                    color: white;
                    border: none;
                    font-size: 40px;
                    width: 50px;
                    height: 80px;
                    cursor: pointer;
                    border-radius: 8px;
                    transition: opacity 0.2s;
                "> ❮ </button>
		<!-- 右箭头 -->
		<button id="nextImage" style="
                    position: absolute;
                    right: 20px;
                    top: 50%;
                    transform: translateY(-50%);
                    background: rgba(0, 0, 0, 0.5);
                    color: white;
                    border: none;
                    font-size: 40px;
                    width: 50px;
                    height: 80px;
                    cursor: pointer;
                    border-radius: 8px;
                    transition: opacity 0.2s;
                "> ❯ </button>
	</div>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
	<script>
		// ==================== 希尔伯特曲线算法 ====================
		function gilbert2d(width, height) {
		    const coordinates = [];
		    if (width >= height) {
		        generate2d(0, 0, width, 0, 0, height, coordinates);
		    } else {
		        generate2d(0, 0, 0, height, width, 0, coordinates);
		    }
		    return coordinates;
		}
		
		function generate2d(x, y, ax, ay, bx, by, coordinates) {
		    const w = Math.abs(ax + ay);
		    const h = Math.abs(bx + by);
		    const dax = Math.sign(ax),
		        day = Math.sign(ay);
		    const dbx = Math.sign(bx),
		        dby = Math.sign(by);
		    if (h === 1) {
		        for (let i = 0; i < w; i++) {
		            coordinates.push([x, y]);
		            x += dax;
		            y += day;
		        }
		        return;
		    }
		    if (w === 1) {
		        for (let i = 0; i < h; i++) {
		            coordinates.push([x, y]);
		            x += dbx;
		            y += dby;
		        }
		        return;
		    }
		    let ax2 = Math.floor(ax / 2),
		        ay2 = Math.floor(ay / 2);
		    let bx2 = Math.floor(bx / 2),
		        by2 = Math.floor(by / 2);
		    const w2 = Math.abs(ax2 + ay2);
		    const h2 = Math.abs(bx2 + by2);
		    if (2 * w > 3 * h) {
		        if (w2 % 2 && w > 2) {
		            ax2 += dax;
		            ay2 += day;
		        }
		        generate2d(x, y, ax2, ay2, bx, by, coordinates);
		        generate2d(
		            x + ax2,
		            y + ay2,
		            ax - ax2,
		            ay - ay2,
		            bx,
		            by,
		            coordinates,
		        );
		    } else {
		        if (h2 % 2 && h > 2) {
		            bx2 += dbx;
		            by2 += dby;
		        }
		        generate2d(x, y, bx2, by2, ax2, ay2, coordinates);
		        generate2d(
		            x + bx2,
		            y + by2,
		            ax,
		            ay,
		            bx - bx2,
		            by - by2,
		            coordinates,
		        );
		        generate2d(
		            x + (ax - dax) + (bx2 - dbx),
		            y + (ay - day) + (by2 - dby),
		            -bx2,
		            -by2,
		            -(ax - ax2),
		            -(ay - ay2),
		            coordinates,
		        );
		    }
		}
		
		// 加密（混淆）
		function encrypt(img) {
		    return new Promise((resolve) => {
		        const cvs = document.createElement("canvas");
		        const width = (cvs.width = img.width);
		        const height = (cvs.height = img.height);
		        const ctx = cvs.getContext("2d");
		        ctx.drawImage(img, 0, 0);
		        const imgdata = ctx.getImageData(0, 0, width, height);
		        const imgdata2 = new ImageData(width, height);
		        const curve = gilbert2d(width, height);
		        const offset = Math.round(
		            ((Math.sqrt(5) - 1) / 2) * width * height,
		        );
		        for (let i = 0; i < width * height; i++) {
		            const old_pos = curve[i];
		            const new_pos = curve[(i + offset) % (width * height)];
		            const old_p = 4 * (old_pos[0] + old_pos[1] * width);
		            const new_p = 4 * (new_pos[0] + new_pos[1] * width);
		            imgdata2.data.set(
		                imgdata.data.slice(old_p, old_p + 4),
		                new_p,
		            );
		        }
		        ctx.putImageData(imgdata2, 0, 0);
		        cvs.toBlob(
		            (b) => resolve(URL.createObjectURL(b)),
		            "image/jpeg",
		            1,
		        );
		    });
		}
		
		// 解密（解混淆）
		function decrypt(img) {
		    return new Promise((resolve) => {
		        const cvs = document.createElement("canvas");
		        const width = (cvs.width = img.width);
		        const height = (cvs.height = img.height);
		        const ctx = cvs.getContext("2d");
		        ctx.drawImage(img, 0, 0);
		        const imgdata = ctx.getImageData(0, 0, width, height);
		        const imgdata2 = new ImageData(width, height);
		        const curve = gilbert2d(width, height);
		        const offset = Math.round(
		            ((Math.sqrt(5) - 1) / 2) * width * height,
		        );
		        for (let i = 0; i < width * height; i++) {
		            const old_pos = curve[i];
		            const new_pos = curve[(i + offset) % (width * height)];
		            const old_p = 4 * (old_pos[0] + old_pos[1] * width);
		            const new_p = 4 * (new_pos[0] + new_pos[1] * width);
		            imgdata2.data.set(
		                imgdata.data.slice(new_p, new_p + 4),
		                old_p,
		            );
		        }
		        ctx.putImageData(imgdata2, 0, 0);
		        cvs.toBlob(
		            (b) => resolve(URL.createObjectURL(b)),
		            "image/jpeg",
		            1,
		        );
		    });
		}
		// ==================== DOM 元素 ====================
		const fileInput = document.getElementById("fileInput");
		const uploadSection = document.getElementById("uploadSection");
		const encryptBtn = document.getElementById("encryptBtn");
		const decryptBtn = document.getElementById("decryptBtn");
		const downloadBtn = document.getElementById("downloadBtn");
		const saveAsBtn = document.getElementById("saveAsBtn");
		const selectedFiles = document.getElementById("selectedFiles");
		const progressFill = document.getElementById("progressFill");
		const progressText = document.getElementById("progressText");
		const progressTitle = document.querySelector(".progress-title");
		const imageGrid = document.getElementById("imageGrid");
		const infoTitle = document.getElementById("infoTitle");
		const infoContent = document.getElementById("infoContent");
		
		// ==================== 核心数据结构 ====================
		let currentImages = []; // { image: HTMLImageElement, url: string }
		let isProcessing = false;
		let netCount = 0; // 净混淆次数（正=混淆，负=解混淆）
		
		// ==================== 辅助函数 ====================
		function loadImageFromUrl(url) {
		    return new Promise((resolve, reject) => {
		        const img = new Image();
		        img.onload = () => resolve(img);
		        img.onerror = reject;
		        img.src = url;
		    });
		}
		
		function setButtonsEnabled(enabled) {
		    encryptBtn.disabled = !enabled;
		    decryptBtn.disabled = !enabled;
		    downloadBtn.disabled = !enabled;
		    saveAsBtn.disabled = !enabled;
		}
		
		function resetButtonsAfterUpload() {
		    encryptBtn.disabled = false;
		    decryptBtn.disabled = false;
		    downloadBtn.disabled = true;
		    saveAsBtn.disabled = true;
		    netCount = 0;
		    updateNetCountDisplay();
		}
		
		function enableButtonsAfterProcess() {
		    encryptBtn.disabled = false;
		    decryptBtn.disabled = false;
		    if (currentImages.length > 0) {
		        downloadBtn.disabled = false;
		        saveAsBtn.disabled = false;
		    }
		}
		
		function updateProgress(completed, total) {
		    const percent = Math.round((completed / total) * 100);
		    progressFill.style.width = `${percent}%`;
		    progressText.textContent = `${completed} / ${total} 已完成`;
		}
		
		function updateNetCountDisplay() {
		    const sign =
		        netCount > 0
		            ? `+${netCount}`
		            : netCount < 0
		              ? `${netCount}`
		              : "0";
		    progressTitle.innerHTML = `处理进度   ${sign}`;
		}
		
		// ==================== 上传处理 ====================
		function handleFiles(files) {
		    if (isProcessing) return;
		
		    for (const item of currentImages) {
		        URL.revokeObjectURL(item.url);
		    }
		    currentImages = [];
		    imageGrid.innerHTML = "";
		    selectedFiles.textContent = "未选择文件";
		    progressFill.style.width = "0%";
		    progressText.textContent = "0 / 0 已完成";
		    resetButtonsAfterUpload();
		
		    const imageFiles = Array.from(files).filter((file) =>
		        file.type.startsWith("image/"),
		    );
		    if (imageFiles.length === 0) return;
		
		    selectedFiles.textContent = `已选择 ${imageFiles.length} 个文件`;
		
		    let loadedCount = 0;
		    imageFiles.forEach((file, idx) => {
		        const url = URL.createObjectURL(file);
		        const img = new Image();
		        img.onload = () => {
		            currentImages.push({ image: img, url: url });
		            const imageItem = document.createElement("div");
		            imageItem.className = "image-item";
		            imageItem.innerHTML = `
												                    <img class="image-preview" src="${url}" alt="${file.name}">
														                        <div class="image-name">${file.name}</div>
																	                    <div class="image-status" data-index="${idx}">等待处理</div>
																			                    `;
		            imageGrid.appendChild(imageItem);
		            loadedCount++;
		            if (loadedCount === imageFiles.length) {
		                encryptBtn.disabled = false;
		                decryptBtn.disabled = false;
		            }
		        };
		        img.onerror = () => {
		            console.error(`加载图片 ${file.name} 失败`);
		            URL.revokeObjectURL(url);
		            loadedCount++;
		        };
		        img.src = url;
		    });
		}
		
		// ==================== 批量处理 ====================
		async function batchProcess(mode) {
		    if (currentImages.length === 0 || isProcessing) return;
		
		    isProcessing = true;
		    setButtonsEnabled(false);
		
		    // 更新净次数
		    netCount += mode === "encrypt" ? 1 : -1;
		    updateNetCountDisplay();
		
		    const total = currentImages.length;
		    let completed = 0;
		    updateProgress(0, total);
		
		    for (let i = 0; i < total; i++) {
		        const item = currentImages[i];
		        const oldUrl = item.url;
		        const statusEl = document.querySelector(
		            `.image-status[data-index="${i}"]`,
		        );
		        if (statusEl) {
		            statusEl.textContent = "处理中...";
		            statusEl.style.color = "#4f1787";
		        }
		
		        try {
		            const processFunc =
		                mode === "encrypt" ? encrypt : decrypt;
		            const newUrl = await processFunc(item.image);
		            const newImg = await loadImageFromUrl(newUrl);
		
		            const previewImg = document.querySelector(
		                `.image-item:nth-child(${i + 1}) .image-preview`,
		            );
		            if (previewImg) previewImg.src = newUrl;
		
		            URL.revokeObjectURL(oldUrl);
		            currentImages[i] = { image: newImg, url: newUrl };
		
		            if (statusEl) {
		                statusEl.textContent =
		                    mode === "encrypt" ? "已混淆" : "已解混淆";
		                statusEl.style.color = "#2ecc71";
		            }
		        } catch (error) {
		            console.error(`处理图片 ${i} 失败:`, error);
		            if (statusEl) {
		                statusEl.textContent = "处理失败";
		                statusEl.style.color = "#e74c3c";
		            }
		        }
		
		        completed++;
		        updateProgress(completed, total);
		        await new Promise((resolve) => setTimeout(resolve, 10));
		    }
		
		    isProcessing = false;
		    enableButtonsAfterProcess();
		}
		
		encryptBtn.addEventListener("click", () => batchProcess("encrypt"));
		decryptBtn.addEventListener("click", () => batchProcess("decrypt"));
		
		// ==================== 保存 ====================
		// 所有另存为
		saveAsBtn.addEventListener("click", async function () {
		    if (currentImages.length === 0) return;
		
		    // 生成带净次数的文件名后缀
		    let countSuffix = "";
		    if (netCount > 0) countSuffix = `__p${netCount}`;
		    else if (netCount < 0) countSuffix = `__n${-netCount}`;
		
		    if (window.showDirectoryPicker) {
		        let dirHandle;
		        try {
		            dirHandle = await window.showDirectoryPicker();
		        } catch (err) {
		            return;
		        }
		
		        for (let i = 0; i < currentImages.length; i++) {
		            const item = currentImages[i];
		            const originalName =
		                document.querySelector(
		                    `.image-item:nth-child(${i + 1}) .image-name`,
		                )?.textContent || `image_${i + 1}`;
		            const baseName = originalName.replace(/\.[^/.]+$/, "");
		            const fileName = `${baseName}${countSuffix}.jpg`;
		            try {
		                const response = await fetch(item.url);
		                const blob = await response.blob();
		                const fileHandle = await dirHandle.getFileHandle(
		                    fileName,
		                    { create: true },
		                );
		                const writable = await fileHandle.createWritable();
		                await writable.write(blob);
		                await writable.close();
		                const statusEl = document.querySelector(
		                    `.image-status[data-index="${i}"]`,
		                );
		                if (statusEl) {
		                    statusEl.textContent = "已保存";
		                    statusEl.style.color = "#3498db";
		                }
		            } catch (err) {
		                console.error(
		                    `保存图片 ${originalName} 失败:`,
		                    err,
		                );
		                const statusEl = document.querySelector(
		                    `.image-status[data-index="${i}"]`,
		                );
		                if (statusEl) {
		                    statusEl.textContent = "保存失败";
		                    statusEl.style.color = "#e74c3c";
		                }
		            }
		        }
		        return;
		    }
		
		    // 打包 ZIP
		    const zip = new JSZip();
		    const folder = zip.folder("混淆图片");
		
		    for (let i = 0; i < currentImages.length; i++) {
		        const item = currentImages[i];
		        const originalName =
		            document.querySelector(
		                `.image-item:nth-child(${i + 1}) .image-name`,
		            )?.textContent || `image_${i + 1}`;
		        const baseName = originalName.replace(/\.[^/.]+$/, "");
		        const fileName = `${baseName}${countSuffix}.jpg`;
		        try {
		            const response = await fetch(item.url);
		            const blob = await response.blob();
		            folder.file(fileName, blob);
		        } catch (err) {
		            console.error(`获取图片 ${originalName} 失败:`, err);
		        }
		    }
		
		    const zipBlob = await zip.generateAsync({ type: "blob" });
		
		    if (window.showSaveFilePicker) {
		        try {
		            const handle = await window.showSaveFilePicker({
		                suggestedName: `混淆图片_${new Date().getTime()}.zip`,
		                types: [
		                    {
		                        description: "ZIP 文件",
		                        accept: { "application/zip": [".zip"] },
		                    },
		                ],
		            });
		            const writable = await handle.createWritable();
		            await writable.write(zipBlob);
		            await writable.close();
		            for (let i = 0; i < currentImages.length; i++) {
		                const statusEl = document.querySelector(
		                    `.image-status[data-index="${i}"]`,
		                );
		                if (statusEl) {
		                    statusEl.textContent = "已保存";
		                    statusEl.style.color = "#3498db";
		                }
		            }
		            return;
		        } catch (err) {}
		    }
		
		    const link = document.createElement("a");
		    link.href = URL.createObjectURL(zipBlob);
		    link.download = `混淆图片_${new Date().getTime()}.zip`;
		    document.body.appendChild(link);
		    link.click();
		    document.body.removeChild(link);
		    URL.revokeObjectURL(link.href);
		});
		
		// 下载所有（逐个下载）
		downloadBtn.addEventListener("click", async function () {
		    if (currentImages.length === 0) return;
		
		    let countSuffix = "";
		    if (netCount > 0) countSuffix = `__p${netCount}`;
		    else if (netCount < 0) countSuffix = `__n${-netCount}`;
		
		    for (let i = 0; i < currentImages.length; i++) {
		        const item = currentImages[i];
		        const originalName =
		            document.querySelector(
		                `.image-item:nth-child(${i + 1}) .image-name`,
		            )?.textContent || `image_${i + 1}`;
		        const baseName = originalName.replace(/\.[^/.]+$/, "");
		        const fileName = `${baseName}${countSuffix}.jpg`;
		        try {
		            const response = await fetch(item.url);
		            const blob = await response.blob();
		            const a = document.createElement("a");
		            a.href = URL.createObjectURL(blob);
		            a.download = fileName;
		            document.body.appendChild(a);
		            a.click();
		            document.body.removeChild(a);
		            URL.revokeObjectURL(a.href);
		            const statusEl = document.querySelector(
		                `.image-status[data-index="${i}"]`,
		            );
		            if (statusEl) {
		                statusEl.textContent = "已下载";
		                statusEl.style.color = "#3498db";
		            }
		        } catch (err) {
		            console.error(`下载图片 ${originalName} 失败:`, err);
		            const statusEl = document.querySelector(
		                `.image-status[data-index="${i}"]`,
		            );
		            if (statusEl) {
		                statusEl.textContent = "下载失败";
		                statusEl.style.color = "#e74c3c";
		            }
		        }
		        await new Promise((resolve) => setTimeout(resolve, 100));
		    }
		});
		
		// ==================== 拖拽上传、折叠、大图预览 ====================
		uploadSection.addEventListener("dragover", (e) => {
		    e.preventDefault();
		    uploadSection.classList.add("dragover");
		});
		uploadSection.addEventListener("dragleave", (e) => {
		    e.preventDefault();
		    uploadSection.classList.remove("dragover");
		});
		uploadSection.addEventListener("drop", (e) => {
		    e.preventDefault();
		    uploadSection.classList.remove("dragover");
		    handleFiles(e.dataTransfer.files);
		});
		fileInput.addEventListener("change", (e) =>
		    handleFiles(e.target.files),
		);
		infoTitle.addEventListener("click", () => {
		    infoTitle.classList.toggle("collapsed");
		    infoContent.classList.toggle("collapsed");
		});
		
		// 大图预览
		const modal = document.getElementById("previewModal");
		const modalImg = document.getElementById("modalImage");
		const closeModal = document.getElementById("closeModal");
		const prevBtn = document.getElementById("prevImage");
		const nextBtn = document.getElementById("nextImage");
		
		let currentIndex = -1,
		    touchStartX = 0;
		
		function getPreviewImages() {
		    return Array.from(document.querySelectorAll(".image-preview"));
		}
		
		function updateModalImage(index) {
		    const images = getPreviewImages();
		    if (images.length === 0) return;
		    if (index < 0) index = images.length - 1;
		    if (index >= images.length) index = 0;
		    currentIndex = index;
		    modalImg.src = images[currentIndex].src;
		}
		
		function prevImage() {
		    updateModalImage(currentIndex - 1);
		}
		function nextImage() {
		    updateModalImage(currentIndex + 1);
		}
		
		document.addEventListener("click", (e) => {
		    const item = e.target.closest(".image-item");
		    if (!item) return;
		    const preview = item.querySelector(".image-preview");
		    if (!preview) return;
		    e.preventDefault();
		    e.stopPropagation();
		    const images = getPreviewImages();
		    const clickedIndex = images.findIndex((img) => img === preview);
		    if (clickedIndex !== -1) currentIndex = clickedIndex;
		    modalImg.src = preview.src;
		    modal.style.display = "block";
		    document.body.style.overflow = "hidden";
		});
		
		function closeModalFunc() {
		    modal.style.display = "none";
		    modalImg.src = "";
		    document.body.style.overflow = "";
		    currentIndex = -1;
		}
		
		closeModal.addEventListener("click", closeModalFunc);
		modal.addEventListener("click", (e) => {
		    if (e.target === modal) closeModalFunc();
		});
		document.addEventListener("keydown", (e) => {
		    if (modal.style.display !== "block") return;
		    if (e.key === "ArrowLeft" || e.key === "k") {
		        prevImage();
		        e.preventDefault();
		    } else if (e.key === "ArrowRight" || e.key === "j") {
		        nextImage();
		        e.preventDefault();
		    } else if (e.key === "Escape") {
		        closeModalFunc();
		    }
		});
		modal.addEventListener("touchstart", (e) => {
		    touchStartX = e.touches[0].clientX;
		});
		modal.addEventListener("touchmove", (e) => {
		    if (!touchStartX) return;
		    const deltaX = e.touches[0].clientX - touchStartX;
		    if (Math.abs(deltaX) > 50) {
		        if (deltaX > 0) prevImage();
		        else nextImage();
		        touchStartX = 0;
		        e.preventDefault();
		    }
		});
		modal.addEventListener("touchend", () => {
		    touchStartX = 0;
		});
		prevBtn.addEventListener("click", (e) => {
		    e.stopPropagation();
		    prevImage();
		});
		nextBtn.addEventListener("click", (e) => {
		    e.stopPropagation();
		    nextImage();
		});
	</script>
</body>
</html>
